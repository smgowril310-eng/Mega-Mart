<div class="image">
    <img src="pikachu.png" alt="pikachu">
</div>

<div class="login-box">

    <h1>Mega <em>Mart</em></h1>
     <br>
     <br>

   <div class="switch-box">

    <button id="loginTab"
            onclick="showLogin()">
        Login 👤
    </button>

    <button id="registerTab"
            onclick="showRegister()">
        Register 📝
    </button>

    <div class="slider"></div>

</div>
    <div id="loginForm">
    <input type="text"
           id="username"
           placeholder="Enter Username">

    <input type="password"
           id="password"
           placeholder="Enter Password">

    <button onclick="login()" id="loginBtn">
        Login
    </button>

    </div>
    <div id="registerForm" style="display:none;">

    <input type="text"
           id="fullName"
           placeholder="Full Name">

    <input type="text"
           id="newUsername"
           placeholder="Username">

    <input type="password"
           id="newPassword"
           placeholder="Password">

    <input type="password"
           id="confirmPassword"
           placeholder="Confirm Password">

    <button onclick="register()" id="loginBtn">
        Register
    </button>

</div>
</div>

<script>
function showLogin(){

document.getElementById("loginForm").style.display="block";

document.getElementById("registerForm").style.display="none";

document.querySelector(".slider").style.left="0px";

}

function showRegister(){

document.getElementById("loginForm").style.display="none";

document.getElementById("registerForm").style.display="block";

document.querySelector(".slider").style.left="110px";

}


    function register(){

    let name=document.getElementById("fullName").value;

    let username=document.getElementById("newUsername").value;

    let password=document.getElementById("newPassword").value;

    let confirm=document.getElementById("confirmPassword").value;

    if(password!=confirm){

        alert("Password does not match");

        return;
    }

    alert("Registered Successfully");

    showLogin();

}
function register() {

    let fullname = document.getElementById("fullName").value;
    let username = document.getElementById("newUsername").value;
    let password = document.getElementById("newPassword").value;
    let confirm = document.getElementById("confirmPassword").value;

    if(password != confirm){

        alert("Passwords do not match");

        return;

    }

    fetch("mega-mart-production.up.railway.app",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            fullname:fullname,
            username:username,
            password:password

        })

    })
    .then(response=>response.json())
    .then(data=>{

        alert("Registration Successful");

        showLogin();

    })
    .catch(error=>{

        console.error(error);

        alert("Registration Failed");

    });

}
function login() {

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    fetch("mega-mart-production.up.railway.app", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            username: username,
            password: password
        })

    })
   .then(response => response.text()) 
   .then(data => {

    if(data === "SUCCESS"){
        alert("Login Successful");
        window.location.href="Home.html";
    }else{
        alert("Invalid Username or Password");
    }

})
    .catch(error => {

        console.error(error);

        alert("Server Error");

    });

}

</script>
